name: Deploy to Vercel

# Deploys every push to master to production, so slide/doc edits go live
# without anyone running the Vercel CLI locally.
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_ALgQw8A4iJAS2djq5WtBaYze
      VERCEL_PROJECT_ID: prj_XKeOUQvA5ALvL5neONRgnx6At9IF
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (build runs on Vercel)
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
